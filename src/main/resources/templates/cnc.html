<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">CNC MACHINE PARAMETER VISUALIZATION SYSTEM</title>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/c3/0.7.20/c3.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/c3/0.7.20/c3.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/components/cncButton.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncMetalPlateBackground.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncTitlePlate.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncDoubleDisplay.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncGraphArea.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncChartScreen.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncEventPlate.css}">
    <link rel="stylesheet" th:href="@{/css/components/cncMessagePanel.css}">

    <link rel="stylesheet" th:href="@{/css/cnc.css}">
</head>
<body>

<div class="cnc-layout">
    <header class="cnc-header">
        <div class="cnc-title">
            <span>СИСТЕМА ВИЗУАЛИЗАЦИИ</span>
            <span>ЧПУ ТЕЛЕМЕТРИИ</span>
        </div>
        <div class="cnc-datetime">
            <div id="cnc-time">00 : 00</div>
            <div id="cnc-date">00 / 00 / 0000</div>
        </div>
    </header>

    <div class="cnc-stripe"></div>

    <main class="cnc-main">

        <div class="cnc-box cnc-box--menu">
            <div class="cnc-menu">


                <div th:replace="~{components/cncButton :: cnc-button('ГЛАВ', true)}"></div>
                <div th:replace="~{components/cncButton :: cnc-button('КОРД', false)}"></div>
                <div th:replace="~{components/cncButton :: cnc-button('ТЕМП', false)}"></div>
                <div th:replace="~{components/cncButton :: cnc-button('ОБОР', false)}"></div>
                <div th:replace="~{components/cncButton :: cnc-button('СЕТЬ', false)}"></div>
                <div th:replace="~{components/cncButton :: cnc-button('СТАТ', false)}"></div>

            </div>
        </div>

        <div class="cnc-box cnc-box--content">
            <div class="cnc-screens">

                <section id="screen-main" class="cnc-screen cnc-screen--active">
                    <div class="cnc-metal-plate">
                        <div th:replace="~{components/cncTitlePlate :: cnc-title('Пример','текста')}"></div>
                        <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('Пример','текста')}"></div>
                        <div th:replace="~{components/cncGraphArea :: cnc-graph-area}"></div>
                        <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                    </div>

                    <div class="cnc-metal-plate">
                        <div class="cnc-metal-plate__content">
                            <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('Пример графика')}"></div>
                        </div>
                        <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                    </div>

                    <div class="cnc-metal-plate">
                        <div class="cnc-metal-plate__content">
                            <div th:replace="~{components/cncEventPlate :: cnc-event-plate('ПРИМЕР', true, false)}"></div>
                            <div th:replace="~{components/cncMessagePanel :: cnc-message-panel(
                                    'пример',
                                    'пример',
                                    'пример',
                                    'пример'
                                )}"></div>
                        </div>
                        <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                    </div>

                    <div th:replace="~{components/cncButton :: cnc-button('ПРИМЕР', False)}"></div>

                </section>

                <section id="screen-cord" class="cnc-screen">
                    <div class="cnc-screen-flow">
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncTitlePlate :: cnc-title('РАСЧЕТНАЯ','СИСТЕМА КООРДИНАТ')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('Z_MCS','605.907')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('X_MCS','361.553')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('Y_MCS','-80.773')}"></div>
                                <div th:replace="~{components/cncGraphArea :: cnc-graph-area}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncTitlePlate :: cnc-title('РАБОЧАЯ','СИСТЕМА КООРДИНАТ')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('Z_WCS','605.907')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('X_WCS','-361.553')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('Y_WCS','-80.773')}"></div>
                                <div th:replace="~{components/cncGraphArea :: cnc-graph-area}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncTitlePlate :: cnc-title('УГОЛ','НАКЛОНА')}"></div>
                                <div th:replace="~{components/cncDoubleDisplay :: cnc-double-display('R_POS','0.0')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                    </div>
                </section>

                <section id="screen-temp" class="cnc-screen">
                    <div class="cnc-screen-flow">
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('tempChart')}"></div>
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('yTempChart')}"></div>
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('zTempChart')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('spindleTempChart')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                    </div>
                </section>

                <section id="screen-spin" class="cnc-screen">
                    <div class="cnc-screen-flow">
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('spindleSmoothedSpeedChart')}"></div>
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('spindleSpeedChart')}"></div>
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('spindleAngularVelocityChart')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('rotarityVelocityChart')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                    </div>
                </section>

                <section id="screen-volt" class="cnc-screen">
                    <div class="cnc-screen-flow">
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('electricCurrentChart')}"></div>
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('voltageChart')}"></div>
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('powerChart')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncChartScreen :: cnc-chart-screen('torqueChart')}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                    </div>
                </section>

                <section id="screen-cond" class="cnc-screen">
                    <div class="cnc-screen-flow">
                        <div class="cnc-metal-plate">
                            <div class="cnc-metal-plate__content">
                                <div th:replace="~{components/cncEventPlate :: cnc-event-plate('EVENT 1', true, false)}"></div>
                                <div th:replace="~{components/cncEventPlate :: cnc-event-plate('EVENT 2', false, true)}"></div>
                                <div th:replace="~{components/cncMessagePanel :: cnc-message-panel(
                                    'СТАНОК 1',
                                    '11:10:06',
                                    '22 / 06 / 2026',
                                    'ЗАЩИТА ПРОХОДИТ УСПЕЩНО(Я НАДЕЮСЬ).'
                                )}"></div>
                            </div>
                            <div th:replace="~{components/cncMetalPlateBackground :: bolts}"></div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <div class="cnc-stripe"></div>
</div>

<script th:src="@{/js/cnc.js}"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    window.APP_THRESHOLDS = /*[[${thresholds}]]*/ {};
    /*]]>*/
</script>
<script th:src="@{/js/cnc.js}"></script>

</body>
</html>
