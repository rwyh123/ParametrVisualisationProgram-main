plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.groovy:groovy:5.0.0'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // --- DB ---
    implementation("org.postgresql:postgresql:42.7.8")
    implementation("org.hibernate:hibernate-core:7.1.0.Final")
    implementation 'jakarta.persistence:jakarta.persistence-api:3.2.0'
    implementation group: 'jakarta.annotation', name: 'jakarta.annotation-api', version: '3.0.0'

    // --- SPRING ---
    // Hibernate/JPA интеграция
    implementation("org.springframework:spring-orm:6.2.11")
    implementation("org.springframework:spring-context:6.0.21")
    implementation 'org.springframework.boot:spring-boot-starter-web:3.2.3'

    implementation 'org.springframework.boot:spring-boot-starter-web:3.2.3'

    // ДОБАВИТЬ ЭТО: Движок шаблонов Thymeleaf
    implementation 'org.springframework.boot:spring-boot-starter-thymeleaf:3.2.3'
}

test {
    useJUnitPlatform()
}


